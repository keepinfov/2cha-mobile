name: CI

# PR gate: build a single-ABI (arm64-v8a) debug APK with the exact toolchain
# pinned in flake.nix via `nix develop`. This still exercises the full native
# pipeline — cargo-ndk, uniffi bindgen, the generated Kotlin — so an FFI break
# in the `native/2cha` submodule fails the PR, while compiling 4x less Rust
# than the release build (which keeps all four ABIs).
#
# Build outputs are cached across runs: magic-nix-cache covers the toolchain
# closure, actions/cache covers cargo's registry/target dir (keyed on the
# submodule's Cargo.lock) and Gradle's caches. A warm re-run only recompiles
# the crates that actually changed.

on:
  pull_request:
    branches: [master, main]

# magic-nix-cache authenticates to FlakeHub via OIDC: it needs permission to
# request the job's id-token, or the cache silently degrades / errors.
permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build debug APK (arm64-v8a)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with native submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Cache the Nix store (SDK/NDK/Rust closure)
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Cache cargo registry + native target dir
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/2cha/target
          key: ${{ runner.os }}-cargo-android-debug-${{ hashFiles('native/2cha/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-android-debug-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties', 'gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        # --no-configuration-cache: see release.yml — the custom Rust/uniffi
        # Exec tasks can't be serialized by the configuration cache.
        run: nix develop --command ./gradlew :app:assembleDebug -PnativeAbis=arm64-v8a --no-daemon --no-configuration-cache --stacktrace
